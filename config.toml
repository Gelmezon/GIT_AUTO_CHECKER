[scheduler]
interval_secs = 1
task_timeout_secs = 300
max_concurrency = 4
claim_batch_size = 16

[codex]
api_key = ""
command = "codex"
model = "gpt-5.4"
max_retries = 2
timeout_secs = 300

[mcp]
host = "127.0.0.1"
port = 3100

[database]
path = "data/scheduler.db"

[runtime]
check_dir = "check"
tests_generated_dir = "tests-generated"

[log]
level = "info"
file = "logs/git-helper.log"

[web]
jwt_secret = "change-me-before-production"
token_expire_hours = 168
static_dir = "web/dist"

