<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>git-helper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --card: #fffdf8;
        --ink: #1f1a16;
        --muted: #6d6257;
        --accent: #c25b2a;
        --line: #e8ded2;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(194, 91, 42, 0.12), transparent 28%),
          linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 18px 60px rgba(76, 48, 30, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.6rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      code {
        background: #f2e7da;
        border-radius: 8px;
        padding: 2px 6px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        color: white;
        background: var(--accent);
      }

      a.secondary {
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <p>git-helper</p>
      <h1>消息中心后端已接入</h1>
      <p>
        当前版本已经提供 <code>/api/auth/*</code> 与 <code>/api/messages/*</code>
        接口，并托管这个占位页。后续可继续把 Vue3 前端按设计稿补齐。
      </p>
      <div class="actions">
        <a href="/health">健康检查</a>
        <a class="secondary" href="/api/messages/unread-count">消息接口</a>
      </div>
    </main>
  </body>
  </html>
